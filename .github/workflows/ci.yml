name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: .tgz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: .tgz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: .tgz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: .zip

    env:
      BIN_NAME: rugen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p rugen-cli --bin ${{ env.BIN_NAME }}

      - name: Compute version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare archive layout (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PKG_DIR="${BIN_NAME}-cli-${{ matrix.target }}-v${VERSION}"
          mkdir "$PKG_DIR"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$PKG_DIR/"
          tar czf "${PKG_DIR}.tgz" "$PKG_DIR"

      - name: Prepare archive layout (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkgDir = "${env:BIN_NAME}-cli-${{ matrix.target }}-v${env:VERSION}"
          New-Item -ItemType Directory -Path $pkgDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "$pkgDir/"
          Compress-Archive -Path $pkgDir -DestinationPath "$pkgDir.zip"

      - name: Create GitHub release if missing
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ${{ env.BIN_NAME }}-cli-${{ matrix.target }}-v${{ env.VERSION }}${{ matrix.archive_ext }}